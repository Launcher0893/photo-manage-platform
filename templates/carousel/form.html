{% extends 'admin_base.html' %}

{% block title %}{{ carousel and '编辑轮播图' or '新增轮播图' }}{% endblock %}

{% block content %}
<div class="admin-page-header">
    <div>
        <h2 class="admin-page-title">{{ carousel and '编辑轮播图' or '新增轮播图' }}</h2>
        <p class="admin-page-desc">配置首页轮播图片、排序和点击跳转目标。</p>
    </div>
    <div class="admin-actions">
        <a href="/admin/carousel/list" class="btn btn-secondary">返回列表</a>
    </div>
</div>

<div class="admin-form-card">
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label">标题</label>
                <input type="text" name="title" class="form-control" value="{{ carousel.title if carousel else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">排序</label>
                <input type="number" name="sort" class="form-control" value="{{ carousel.sort if carousel else 0 }}">
            </div>
            <div class="col-12">
                <label class="form-label">图片 URL</label>
                <input type="text" name="image_url" class="form-control" value="{{ carousel.image_url if carousel else '' }}">
            </div>
            <div class="col-12">
                <label class="form-label">上传图片</label>
                <input type="file" name="image_file" class="form-control" accept="image/*">
                {% if carousel and carousel.image_url %}
                    <div class="mt-3">
                        <img src="{{ carousel.image_url }}" class="admin-thumb" alt="{{ carousel.title or '轮播图' }}">
                        <span class="text-muted small ms-2">当前图片</span>
                    </div>
                {% endif %}
            </div>
            <div class="col-md-4">
                <label class="form-label">跳转类型</label>
                <select name="link_type" class="form-select">
                    <option value="">无</option>
                    <option value="work" {% if carousel and carousel.link_type == 'work' %}selected{% endif %}>作品</option>
                    <option value="photographer" {% if carousel and carousel.link_type == 'photographer' %}selected{% endif %}>摄影师</option>
                    <option value="announcement" {% if carousel and carousel.link_type == 'announcement' %}selected{% endif %}>公告</option>
                    <option value="url" {% if carousel and carousel.link_type == 'url' %}selected{% endif %}>外部链接</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">跳转目标 ID</label>
                <input type="number" name="link_id" class="form-control" value="{{ carousel.link_id if carousel else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">外部链接地址</label>
                <input type="text" name="link_url" class="form-control" value="{{ carousel.link_url if carousel else '' }}">
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ carousel and '保存修改' or '新增轮播图' }}</button>
            <a href="/admin/carousel/list" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
