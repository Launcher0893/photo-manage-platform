{% extends 'admin_base.html' %}

{% block title %}{{ announcement and '编辑公告' or '发布公告' }}{% endblock %}

{% block content %}
<div class="admin-page-header">
    <div>
        <h2 class="admin-page-title">{{ announcement and '编辑公告' or '发布公告' }}</h2>
        <p class="admin-page-desc">公告会展示在公告列表，最新发布公告可在首页弹窗中显示。</p>
    </div>
    <div class="admin-actions">
        <a href="/admin/announcement/list" class="btn btn-secondary">返回列表</a>
    </div>
</div>

<div class="admin-form-card">
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">标题</label>
            <input type="text" name="title" class="form-control" required value="{{ announcement.title if announcement else '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">内容</label>
            <textarea name="content" class="form-control" rows="9" required>{{ announcement.content if announcement else '' }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">公告封面图</label>
            <input type="file" name="cover_file" class="form-control" accept="image/*">
            {% if announcement and announcement.cover_url %}
                <div class="mt-3">
                    <img src="{{ announcement.cover_url }}" class="admin-thumb" alt="{{ announcement.title }}">
                    <span class="text-muted small ms-2">当前封面</span>
                </div>
            {% endif %}
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ announcement and '保存修改' or '发布公告' }}</button>
            <a href="/admin/announcement/list" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
