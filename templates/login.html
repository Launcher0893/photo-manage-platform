{% extends 'base.html' %}

{% block title %}登录{% endblock %}

{% block content %}
<!-- 全屏图片背景 -->
<div style="position:fixed; top:0; left:0; width:100vw; height:100vh;
background:url('../photo/login_back.jpg') no-repeat center center;
background-size:cover; z-index:-1;"></div>

<div class="row justify-content-center" style="margin-top:100px;">
    <!-- 改col-md-4 变窄 -->
    <div class="col-md-4">
        <!-- 调宽度更窄，padding上下加大拉长高度 -->
        <div style="background:rgba(255,255,255,0.92); padding:50px 35px; border-radius:12px; box-shadow:0 0 30px rgba(0,0,0,0.2);">
            <h2 style="text-align:center; margin-bottom:35px; color:#222;">登录</h2>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label style="color:#444; margin-bottom:8px; display:block;">账号</label>
                    <input type="text" name="username" class="form-control" required style="border:1px solid #ddd;border-radius:6px;padding:12px;">
                </div>
                <div class="mb-4">
                    <label style="color:#444; margin-bottom:8px; display:block;">密码</label>
                    <input type="password" name="password" class="form-control" required style="border:1px solid #ddd;border-radius:6px;padding:12px;">
                </div>
                <button type="submit" class="btn" style="background:#222; color:white; width:100%; padding:12px; border-radius:6px; border:none; margin-top:15px;">登录</button>
                <p class="mt-4 text-center">还没有账号？<a href="/auth/register" style="color:#222;text-decoration:none;">立即注册</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
