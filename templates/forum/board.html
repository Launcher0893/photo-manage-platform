{% extends 'base.html' %}

{% block title %}论坛板块{% endblock %}

{% block content %}
    <h2>论坛板块</h2>
    <div class="row">
        {% for board in boards %}
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title"><a href="/forum/post_list/{{ board.board_id }}">{{ board.board_name }}</a></h5>
                        <p class="card-text">{{ board.description or '暂无描述' }}</p>
                        <p class="card-text">帖子数：{{ board.posts|length }}</p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
