{% extends 'base.html' %}

{% block title %}发布帖子{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2>发布帖子</h2>
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="board_id" value="{{ board.board_id if board else request.view_args.get('board_id', '') }}">
                {% if board %}
                    <div class="mb-3">
                        <label>所属板块</label>
                        <input type="text" class="form-control" value="{{ board.board_name }}" readonly>
                    </div>
                {% endif %}
                <div class="mb-3">
                    <label>标题</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>内容</label>
                    <textarea name="content" class="form-control" rows="10" required></textarea>
                </div>
                <div class="mb-3">
                    <label>帖子图片</label>
                    <input type="file" name="post_images" class="form-control" accept="image/*" multiple>
                </div>
                <button type="submit" class="btn btn-primary">发布</button>
            </form>
        </div>
    </div>
{% endblock %}
