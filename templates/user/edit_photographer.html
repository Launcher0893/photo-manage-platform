{#
独立完善摄影师资料页面。
页面效果：表单卡片，填写真实姓名和所在城市。
#}
{% extends 'base.html' %}

{% block title %}摄影师资料{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>摄影师资料</h2>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label>真实姓名</label>
                    <input type="text" name="real_name" class="form-control" value="{{ photographer.real_name or '' }}">
                </div>
                <div class="mb-3">
                    <label>所在城市</label>
                    <input type="text" name="city" class="form-control" value="{{ photographer.city or '' }}">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/user/profile" class="btn btn-secondary">返回</a>
            </form>
        </div>
    </div>
{% endblock %}
