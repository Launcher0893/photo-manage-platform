{#
独立编辑个人资料页面。
页面效果：表单卡片，可修改昵称、邮箱、手机号和头像。
当前个人中心也提供弹窗编辑，这个页面保留给直接访问 /user/edit_profile 使用。
#}
{% extends 'base.html' %}

{% block title %}编辑资料{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>编辑资料</h2>
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label>昵称</label>
                    <input type="text" name="nickname" class="form-control" value="{{ current_user.nickname or '' }}">
                </div>
                <div class="mb-3">
                    <label>邮箱</label>
                    <input type="email" name="email" class="form-control" value="{{ current_user.email or '' }}">
                </div>
                <div class="mb-3">
                    <label>手机号</label>
                    <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                </div>
                <div class="mb-3">
                    <label>头像</label>
                    <input type="file" name="avatar_file" class="form-control" accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>
{% endblock %}
