{#
后台分类表单。
页面效果：表单卡片，填写分类名称和排序。
#}
{% extends 'admin_base.html' %}

{% block title %}{{ category and '编辑分类' or '新增分类' }}{% endblock %}

{% block content %}
<div class="admin-page-header">
    <div>
        <h2 class="admin-page-title">{{ category and '编辑分类' or '新增分类' }}</h2>
        <p class="admin-page-desc">维护作品分类名称、排序和启用状态。</p>
    </div>
    <div class="admin-actions">
        <a href="/admin/category/list" class="btn btn-secondary">返回列表</a>
    </div>
</div>

<div class="admin-form-card">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label">分类名称</label>
                <input type="text" name="category_name" class="form-control" required value="{{ category.category_name if category else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">排序</label>
                <input type="number" name="sort" class="form-control" value="{{ category.sort if category else 0 }}">
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ category and '保存修改' or '新增分类' }}</button>
            <a href="/admin/category/list" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
